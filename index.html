<!DOCTYPE html>
<!-- Version is set from APP_VERSION in app.js -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassTracker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-name">ClassTracker</div>
      <div class="logo-sub">P–6 · All Subjects</div>
      <div id="sidebar-version" style="font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);margin-top:4px;letter-spacing:0.1em">--</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Views</div>
      <button class="nav-btn active" onclick="showView('dashboard')" id="nav-dashboard">
        <span class="nav-icon">◈</span> Dashboard
      </button>
      <button class="nav-btn" onclick="showView('students')" id="nav-students">
        <span class="nav-icon">◎</span> Students
      </button>
      <button class="nav-btn" onclick="showView('overview')" id="nav-overview">
        <span class="nav-icon">▦</span> Class Overview
      </button>
      <button class="nav-btn" onclick="showView('bulk-assess')" id="nav-bulk">
        <span class="nav-icon">⊞</span> Bulk Assess
      </button>
      <button class="nav-btn" onclick="openDailyLogWizard()" id="nav-daily-log" style="position:relative">
        <span class="nav-icon">✦</span> Log Today
        <span id="daily-log-badge" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--gold);color:#0f1117;font-family:'DM Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px">NEW</span>
      </button>
      <button class="nav-btn" onclick="showView('daily-log')" id="nav-daily-log-view">
        <span class="nav-icon">◷</span> Session History
      </button>
      <button class="nav-btn" onclick="showView('plan-log')" id="nav-plan-log">
        <span class="nav-icon">✎</span> Plan and Log Learning
      </button>
      <button class="nav-btn" onclick="showView('coverage')" id="nav-coverage">
        <span class="nav-icon">⬡</span> Coverage Gaps
      </button>
      <button class="nav-btn" onclick="showView('standards-judgments')" id="nav-standards-judgments">
        <span class="nav-icon">◈</span> Standards Judgments
      </button>
      <button class="nav-btn" onclick="showView('progression-placement')" id="nav-progression-placement">
        <span class="nav-icon">⟡</span> Progression Placement
      </button>
      <div class="nav-section">Browse Data</div>
      <button class="nav-btn" onclick="showView('curriculum')" id="nav-curriculum">
        <span class="nav-icon">≡</span> Curriculum Codes
      </button>
      <button class="nav-btn" onclick="showView('standards')" id="nav-standards">
        <span class="nav-icon">◇</span> Standards
      </button>
      <button class="nav-btn" onclick="showView('progressions')" id="nav-progressions">
        <span class="nav-icon">⟡</span> Progressions
      </button>
      <div class="nav-section">Admin</div>
      <button class="nav-btn" onclick="toggleAdminMenu()" id="nav-admin">
        <span class="nav-icon">⚙</span> Data &amp; Settings
        <span id="admin-chevron" style="margin-left:auto;font-size:10px;color:var(--text3)">▸</span>
      </button>
      <div id="admin-menu" style="display:none;flex-direction:column;gap:2px;padding-left:8px">
        <div style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);padding:8px 10px 4px">Class Settings</div>
        <button class="nav-btn" style="font-size:12px" onclick="openClassSettings()" id="nav-class-settings">
          <span class="nav-icon">☑</span>
          <span>Subjects &amp; Strands</span>
        </button>
        <div class="theme-control">
          <label for="theme-select" class="theme-label">Theme</label>
          <select id="theme-select" class="theme-select" aria-label="Theme">
            <option value="auto">Auto (System)</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <div id="theme-current" class="theme-current">Current: Auto (System)</div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);padding:8px 10px 4px">Load CSV Files</div>
        <label class="nav-btn" style="cursor:pointer;font-size:12px" id="nav-load-cd">
          <span class="nav-icon" id="icon-cd">○</span>
          <span>Content Descriptors</span>
          <input type="file" accept=".csv" style="display:none" onchange="loadCurriculumCSV(this)">
        </label>
        <label class="nav-btn" style="cursor:pointer;font-size:12px" id="nav-load-st">
          <span class="nav-icon" id="icon-st">○</span>
          <span>Standards</span>
          <input type="file" accept=".csv" style="display:none" onchange="loadStandardsCSV(this)">
        </label>
        <label class="nav-btn" style="cursor:pointer;font-size:12px" id="nav-load-pr">
          <span class="nav-icon" id="icon-pr">○</span>
          <span>Literacy Progressions</span>
          <input type="file" accept=".csv" style="display:none" onchange="loadProgressionsCSV(this,'literacy')">
        </label>
        <label class="nav-btn" style="cursor:pointer;font-size:12px" id="nav-load-np">
          <span class="nav-icon" id="icon-np">○</span>
          <span>Numeracy Progressions</span>
          <input type="file" accept=".csv" style="display:none" onchange="loadProgressionsCSV(this,'numeracy')">
        </label>
        <label class="nav-btn" style="cursor:pointer;font-size:12px" id="nav-load-lk">
          <span class="nav-icon" id="icon-lk">○</span>
          <span>Aspect Links</span>
          <input type="file" accept=".csv" style="display:none" onchange="loadLinksCSV(this)">
        </label>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Connected</span>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading your data…</div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toast-wrap"></div>

<script src="app.js"></script>
</body>
</html>
